services:
  api:
    build:
      context: .
      args:
        YELIZTLI_PORT: ${YELIZTLI_PORT:-8000}
    image: yeliztli:latest
    ports:
      - "${YELIZTLI_PUBLISH_HOST:-127.0.0.1}:${YELIZTLI_PORT:-8000}:${YELIZTLI_PORT:-8000}"
    volumes:
      - yeliztli-data:/data
    environment:
      - YELIZTLI_DATA_DIR=/data
      - YELIZTLI_HOST=0.0.0.0
      - YELIZTLI_PORT=${YELIZTLI_PORT:-8000}
    restart: unless-stopped

  huey:
    image: yeliztli:latest
    volumes:
      - yeliztli-data:/data
    environment:
      - YELIZTLI_DATA_DIR=/data
    command: huey_consumer backend.tasks.huey_tasks.huey -w 1
    depends_on:
      - api
    restart: unless-stopped

volumes:
  # Renamed from `genomeinsight-data` during the Yeliztli rebrand. To carry over an
  # existing volume's data:
  #   docker volume create yeliztli-data
  #   docker run --rm -v genomeinsight-data:/from -v yeliztli-data:/to \
  #     alpine sh -c 'cp -a /from/. /to/'
  yeliztli-data:
